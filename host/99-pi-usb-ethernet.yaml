# Pi USB Ethernet — host-side Netplan profile
#
# Matches the CDC-ECM ethernet interface presented by the Pi over USB.
# The interface name is derived from the Pi's fixed host_addr MAC (aa:bb:cc:dd:ee:01),
# so it is always enxaabbccddee01 on Linux hosts with consistent device naming.
#
# Install with: sudo ./host-setup.sh
#
# Subnet: 192.168.71.0/24
#   Host address: 192.168.71.2  (this file)
#   Pi address:   192.168.71.1  (set in pi/usb0.nmconnection)
#
# optional: true prevents blocking boot when the Pi is not plugged in.
# No gateway is set, so this link never displaces the host's default route.

network:
  version: 2
  renderer: NetworkManager
  ethernets:
    enxaabbccddee01:
      dhcp4: false
      dhcp6: false
      addresses:
        - 192.168.71.2/24
      optional: true
      networkmanager:
        uuid: "4329d810-a229-4c5d-854e-6c8b50ff932f"
        name: "Pi Voice KB USB Ethernet"
